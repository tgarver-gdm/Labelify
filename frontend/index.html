<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Labelify — TTB Label Verification</title>
<style>
  :root { --green:#1a7f37; --red:#cf222e; --amber:#9a6700; --bg:#f6f8fa; --ink:#1f2328; }
  * { box-sizing: border-box; }
  body { font-family: system-ui, "Segoe UI", Arial, sans-serif; color: var(--ink);
         margin: 0; background: var(--bg); }
  header { background:#0b3d2e; color:#fff; padding:18px 24px; }
  header h1 { margin:0; font-size:20px; }
  header p { margin:4px 0 0; opacity:.85; font-size:13px; }
  main { max-width: 980px; margin: 24px auto; padding: 0 16px;
         display:grid; grid-template-columns: 1fr 1fr; gap:20px; }
  .card { background:#fff; border:1px solid #d0d7de; border-radius:10px; padding:18px; }
  .card h2 { margin:0 0 12px; font-size:16px; }
  #drop { border:2px dashed #8c959f; border-radius:10px; padding:28px; text-align:center;
          cursor:pointer; color:#57606a; background:#fafbfc; }
  #drop.hover { border-color: var(--green); background:#eaf6ec; }
  #preview { max-width:100%; max-height:240px; margin-top:12px; border-radius:8px; display:none; }
  label { display:block; font-size:13px; font-weight:600; margin:10px 0 4px; }
  input, textarea { width:100%; padding:9px 10px; border:1px solid #d0d7de; border-radius:7px;
                    font-size:14px; font-family:inherit; }
  textarea { min-height:90px; resize:vertical; }
  button { margin-top:16px; width:100%; padding:13px; font-size:16px; font-weight:600;
           color:#fff; background:var(--green); border:none; border-radius:8px; cursor:pointer; }
  button:disabled { opacity:.6; cursor:wait; }
  .results { grid-column: 1 / -1; }
  .banner { padding:12px 16px; border-radius:8px; font-weight:700; margin-bottom:14px; }
  .banner.pass { background:#eaf6ec; color:var(--green); }
  .banner.needs_review { background:#fff8e5; color:var(--amber); }
  .banner.fail { background:#ffebe9; color:var(--red); }
  .row { display:flex; gap:12px; padding:12px; border-bottom:1px solid #eaeef2; align-items:flex-start; }
  .row:last-child { border-bottom:none; }
  .icon { font-size:20px; line-height:1.2; width:26px; text-align:center; }
  .field-name { font-weight:600; }
  .detail { font-size:13px; color:#57606a; margin-top:2px; }
  .muted { color:#8c959f; font-size:12px; }
  .pass .icon { color:var(--green); }
  .mismatch .icon, .not_found .icon { color:var(--red); }
  .review .icon { color:var(--amber); }
  details { grid-column:1/-1; }
  summary { cursor:pointer; color:#57606a; font-size:13px; }
  pre { white-space:pre-wrap; background:#f6f8fa; padding:10px; border-radius:6px; font-size:12px; }
</style>
</head>
<body>
<header>
  <h1>Labelify <span style="font-weight:400;opacity:.8;font-size:14px">· TTB Label Verification</span></h1>
  <p>Upload a label photo and the application data. We check each required field for you.</p>
</header>

<main>
  <section class="card">
    <h2>1. Label photo</h2>
    <div id="drop">📷 Click or drop a label image here</div>
    <input id="file" type="file" accept="image/*" hidden />
    <img id="preview" alt="label preview" />
  </section>

  <section class="card">
    <h2>2. Application data</h2>
    <label>Brand name</label>
    <input id="brand_name" placeholder="e.g. Stone's Throw" />
    <label>Class / type</label>
    <input id="class_type" placeholder="e.g. Red Wine" />
    <label>Alcohol content (ABV)</label>
    <input id="alcohol_content" placeholder="e.g. 13.5%" />
    <label>Net contents</label>
    <input id="net_contents" placeholder="e.g. 750 mL" />
    <label>Producer name &amp; address</label>
    <input id="producer_name_address" placeholder="e.g. Acme Winery, Napa CA" />
    <label>Country of origin (imports)</label>
    <input id="country_of_origin" placeholder="e.g. France" />
    <label>Government health warning</label>
    <textarea id="government_warning"></textarea>
    <button id="go">Verify label</button>
  </section>

  <section id="out" class="card results" style="display:none"></section>
</main>

<script>
  // Pre-fill the legally-fixed US government warning so agents don't retype it.
  const GOV_WARNING =
    "GOVERNMENT WARNING: (1) According to the Surgeon General, women should not " +
    "drink alcoholic beverages during pregnancy because of the risk of birth defects. " +
    "(2) Consumption of alcoholic beverages impairs your ability to drive a car or " +
    "operate machinery, and may cause health problems.";
  document.getElementById("government_warning").value = GOV_WARNING;

  const drop = document.getElementById("drop");
  const fileInput = document.getElementById("file");
  const preview = document.getElementById("preview");
  let imageFile = null;

  function setFile(f) {
    imageFile = f;
    preview.src = URL.createObjectURL(f);
    preview.style.display = "block";
    drop.textContent = "✓ " + f.name + " — click to change";
  }
  drop.onclick = () => fileInput.click();
  fileInput.onchange = e => e.target.files[0] && setFile(e.target.files[0]);
  drop.ondragover = e => { e.preventDefault(); drop.classList.add("hover"); };
  drop.ondragleave = () => drop.classList.remove("hover");
  drop.ondrop = e => {
    e.preventDefault(); drop.classList.remove("hover");
    if (e.dataTransfer.files[0]) setFile(e.dataTransfer.files[0]);
  };

  const FIELDS = ["brand_name","class_type","alcohol_content","net_contents",
                  "producer_name_address","country_of_origin","government_warning"];
  const ICON = { pass:"✅", review:"⚠️", mismatch:"❌", not_found:"❌" };
  const BANNER = { pass:"PASS — all fields verified",
                   needs_review:"NEEDS REVIEW — some fields need a human glance",
                   fail:"ATTENTION — one or more fields do not match" };

  document.getElementById("go").onclick = async () => {
    if (!imageFile) { alert("Please add a label photo first."); return; }
    const btn = document.getElementById("go");
    btn.disabled = true; btn.textContent = "Reading label…";

    const fd = new FormData();
    fd.append("image", imageFile);
    FIELDS.forEach(f => fd.append(f, document.getElementById(f).value));

    try {
      const res = await fetch("/verify", { method:"POST", body: fd });
      const data = await res.json();
      render(data);
    } catch (err) {
      alert("Something went wrong: " + err);
    } finally {
      btn.disabled = false; btn.textContent = "Verify label";
    }
  };

  function render(data) {
    const out = document.getElementById("out");
    if (data.error) { out.style.display="block"; out.innerHTML =
        `<div class="banner fail">${data.error}</div>`; return; }

    let html = `<div class="banner ${data.overall}">${BANNER[data.overall] || data.overall}</div>`;
    for (const r of data.results) {
      html += `<div class="row ${r.status}">
        <div class="icon">${ICON[r.status] || "•"}</div>
        <div>
          <div class="field-name">${r.label}</div>
          <div class="detail">${r.message}</div>
          <div class="muted">Expected: ${escapeHtml(r.expected || "—")}`
          + (r.found ? ` &nbsp;|&nbsp; On label: ${escapeHtml(r.found)}` : "")
          + ` &nbsp;|&nbsp; confidence ${r.confidence}</div>
        </div></div>`;
    }
    html += `<details><summary>Show raw OCR text</summary><pre>${escapeHtml(data.ocr_text)}</pre></details>`;
    out.innerHTML = html;
    out.style.display = "block";
    out.scrollIntoView({ behavior:"smooth" });
  }

  function escapeHtml(s){ return String(s).replace(/[&<>]/g, c =>
    ({"&":"&amp;","<":"&lt;",">":"&gt;"}[c])); }
</script>
</body>
</html>
